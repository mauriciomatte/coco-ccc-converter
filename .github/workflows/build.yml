name: Build installers (Win / Linux / macOS)

# Dispara ao criar uma TAG de versão (ex.: v1.0.14) ou manualmente (Actions → Run workflow).
# Em tag, além de gerar os artefatos, publica um GitHub Release com os instaladores anexados.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}

permissions:
  contents: write   # necessário para o job de Release criar/anexar os instaladores

jobs:
  build:
    name: Build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            ebflag: '--win'
          - os: ubuntu-latest
            ebflag: '--linux'
          - os: macos-latest
            ebflag: '--mac'
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - name: Build do app (electron-vite)
        run: npm run build

      - name: Empacotar (electron-builder)
        run: npx electron-builder ${{ matrix.ebflag }} --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Build macOS NÃO assinado (sem certificados): evita o electron-builder tentar assinar/notarizar.
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Subir instaladores como artefato
        uses: actions/upload-artifact@v4
        with:
          name: installers-${{ matrix.os }}
          path: |
            dist/*.exe
            dist/*.AppImage
            dist/*.deb
            dist/*.dmg
            dist/*.zip
          if-no-files-found: warn
          retention-days: 30

  release:
    name: Publicar Release (somente em tag)
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    timeout-minutes: 30   # não fica pendurado se a conexão estagnar ("other side closed")
    steps:
      - name: Baixar todos os artefatos (com retry)
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true   # junta installers-win/linux/mac numa pasta só (evita aninhamento)

      # Publicação idempotente via gh CLI (sem ação de terceiros) + retry com backoff.
      # O job de Release era o único ponto frágil: upload de ~440 MB sujeito a quedas de
      # rede transitórias. Cada tentativa usa --clobber, então re-tentar NÃO duplica nem
      # corrompe assets, e cria o release só uma vez se ele ainda não existir.
      - name: Publicar GitHub Release (idempotente, com retry)
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          # Array NUL-delimitado: nomes de instalador têm ESPAÇO e '&' ("CoCoDSK&CCCUtility_Setup 1.0.x.exe").
          mapfile -t -d '' files < <(find artifacts -type f \( -name '*.exe' -o -name '*.AppImage' -o -name '*.deb' -o -name '*.dmg' -o -name '*.zip' \) -print0)
          if [ "${#files[@]}" -eq 0 ]; then echo "::error::Nenhum instalador encontrado em artifacts/"; exit 1; fi
          echo "Instaladores a publicar:"; printf '  %s\n' "${files[@]}"
          # cria o release uma única vez (idempotente entre re-runs/tentativas)
          if ! gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release create "$TAG" --repo "$GITHUB_REPOSITORY" --title "$TAG" --generate-notes
          fi
          # upload com até 5 tentativas e backoff crescente; --clobber substitui assets parciais
          n=0
          until [ "$n" -ge 5 ]; do
            if gh release upload "$TAG" "${files[@]}" --repo "$GITHUB_REPOSITORY" --clobber; then
              echo "✅ Release $TAG publicado com os instaladores."; exit 0
            fi
            n=$((n + 1)); delay=$((n * 20))
            echo "::warning::Upload falhou (tentativa $n/5). Aguardando ${delay}s e tentando de novo…"
            sleep "$delay"
          done
          echo "::error::Falha ao publicar o Release após 5 tentativas."; exit 1
