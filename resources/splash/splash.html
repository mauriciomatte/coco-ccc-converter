<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <style>
    html, body { margin: 0; height: 100%; background: transparent; overflow: hidden; }
    * { font-family: 'Segoe UI', 'Inter', system-ui, sans-serif; -webkit-user-select: none; user-select: none; }
    .card {
      box-sizing: border-box;
      width: 100%; height: 100%;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 16px 18px 18px;
      background: rgba(9, 13, 23, 0.97);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 16px;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.55);
    }
    .pic { width: 100%; border-radius: 12px; display: block; }
    .ver { margin-top: 12px; color: #ffffff; font-size: 14px; font-weight: 700; letter-spacing: .04em; text-align: center; }
    .by { margin-top: 5px; color: #9fb0c8; font-size: 11px; text-align: center; }
    .bar { margin-top: 14px; width: 90%; height: 6px; background: rgba(255, 255, 255, 0.12); border-radius: 4px; overflow: hidden; }
    .fill { height: 100%; width: 0; background: linear-gradient(90deg, #16d65a, #5cff7a); border-radius: 4px; animation: run 5s linear forwards; }
    @keyframes run { from { width: 0; } to { width: 100%; } }
  </style>
</head>
<body>
  <div class="card">
    <img class="pic" id="pic" src="splash.png" alt="" />
    <div class="ver" id="ver"></div>
    <div class="by" id="by"></div>
    <div class="bar"><div class="fill"></div></div>
  </div>
  <script>
    const q = new URLSearchParams(location.search);
    const v = q.get('v') || '';
    const pt = (q.get('lang') || 'pt-br') !== 'en-us';
    document.getElementById('ver').textContent = (pt ? 'versão ' : 'version ') + v;
    document.getElementById('by').textContent = pt
      ? 'MANIPULADOR DE IMAGENS. Por Mauricio Matte (c) 2026'
      : 'IMAGE UTILITY. By Mauricio Matte (c) 2026';
  </script>
</body>
</html>
